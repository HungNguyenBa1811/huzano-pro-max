        <!-- ĐĂNG NHẬP -->
        <template id="tpl-login">

            </header>
            <main class="login-wrapper">
                <h2>Đăng nhập</h2>

                        <label>Tên đăng nhập</label>
                        <input type="text" placeholder="Nhập tên đăng nhập" />
                    </div>
                    <div class="form-input">
                        <label>Mật khẩu</label>
                        <input type="password" placeholder="Nhập mật khẩu" />
                    </div>

        <!-- ĐĂNG KÝ -->

                <h2>Đăng ký tài khoản</h2>

                    <div class="form-input">
                        <label>Tên người dùng</label>
                        <input type="text" placeholder="Nhập tên người dùng" />
                    </div>
                    <div class="form-input">
                        <label>Email</label>
                        <input type="email" placeholder="Nhập email sinh viên" />
                    </div>
                    <div class="form-input">
                        <label>Mật khẩu</label>
                        <input type="password" placeholder="Nhập mật khẩu" />
                    </div>
                    <div class="form-input">
                        <label>Xác nhận mật khẩu</label>
                        <input type="password" placeholder="Nhập lại mật khẩu" />
                    </div>
                    <button type="submit" class="form-button"><i class="fas fa-user-plus"></i> Đăng ký</button>
                    <div class="form-links">
                        <p><a href="#/login">Đã có tài khoản? Đăng nhập</a></p>
                    </div>

        <!-- TRANG BÀI THI -->
        <template id="tpl-exam">
            <header class="header-auth">
                <div class="header-title">
                    <span>HuZaLo</span>
                    <span>-</span>
                    <span>Luyện tập Mạng máy tính</span>
                </div>
                <div class="header-info">
                    <i class="fas fa-clock"></i>
                    <span id="exam-timer">30:00</span>
                </div>
            </header>
            <main>
                <div id="exam-layout">
                    <div id="exam-questions">
                        <div id="q1">
                            <p><b>Câu 1:</b> Giao thức nào hoạt động ở tầng Transport trong mô hình OSI?</p>
                            <label><input type="radio" name="q1" value="0" /> A. HTTP</label>
                            <label><input type="radio" name="q1" value="1" /> B. TCP</label>
                            <label><input type="radio" name="q1" value="2" /> C. IP</label>
                            <label><input type="radio" name="q1" value="3" /> D. ARP</label>
                        </div>

                        <div id="q2">
                            <p><b>Câu 2:</b> Địa chỉ IPv4 có bao nhiêu bit?</p>
                            <label><input type="radio" name="q2" value="0" /> A. 16 bit</label>
                            <label><input type="radio" name="q2" value="1" /> B. 32 bit</label>
                            <label><input type="radio" name="q2" value="2" /> C. 64 bit</label>
                            <label><input type="radio" name="q2" value="3" /> D. 128 bit</label>
                        </div>

                        <div id="q3">
                            <p><b>Câu 3:</b> DNS là viết tắt của?</p>
                            <label><input type="radio" name="q3" value="0" /> A. Data Network System</label>
                            <label><input type="radio" name="q3" value="1" /> B. Domain Name System</label>
                            <label><input type="radio" name="q3" value="2" /> C. Dynamic Network Service</label>
                            <label><input type="radio" name="q3" value="3" /> D. Digital Name Server</label>
                        </div>

                        <div id="q4">
                            <p><b>Câu 4:</b> Cổng mặc định của HTTP là?</p>
                            <label><input type="radio" name="q4" value="0" /> A. 21</label>
                            <label><input type="radio" name="q4" value="1" /> B. 22</label>
                            <label><input type="radio" name="q4" value="2" /> C. 80</label>
                            <label><input type="radio" name="q4" value="3" /> D. 443</label>
                        </div>

                        <div id="q5">
                            <p><b>Câu 5:</b> Mô hình OSI có bao nhiêu tầng?</p>
                            <label><input type="radio" name="q5" value="0" /> A. 4</label>
                            <label><input type="radio" name="q5" value="1" /> B. 5</label>
                            <label><input type="radio" name="q5" value="2" /> C. 6</label>
                            <label><input type="radio" name="q5" value="3" /> D. 7</label>
                        </div>

                        <div id="q6">
                            <p><b>Câu 6:</b> Subnet mask mặc định của lớp C là?</p>
                            <label><input type="radio" name="q6" value="0" /> A. 255.0.0.0</label>
                            <label><input type="radio" name="q6" value="1" /> B. 255.255.0.0</label>
                            <label><input type="radio" name="q6" value="2" /> C. 255.255.255.0</label>
                            <label><input type="radio" name="q6" value="3" /> D. 255.255.255.255</label>
                        </div>

                        <div id="q7">
                            <p><b>Câu 7:</b> Địa chỉ loopback của IPv4 là?</p>
                            <label><input type="radio" name="q7" value="0" /> A. 0.0.0.0</label>
                            <label><input type="radio" name="q7" value="1" /> B. 127.0.0.1</label>
                            <label><input type="radio" name="q7" value="2" /> C. 192.168.0.1</label>
                            <label><input type="radio" name="q7" value="3" /> D. 255.255.255.255</label>
                        </div>

                        <div id="q8">
                            <p><b>Câu 8:</b> Giao thức ARP dùng để làm gì?</p>
                            <label><input type="radio" name="q8" value="0" /> A. Phân giải tên miền</label>
                            <label><input type="radio" name="q8" value="1" /> B. Ánh xạ địa chỉ IP sang MAC</label>
                            <label><input type="radio" name="q8" value="2" /> C. Định tuyến gói tin</label>
                            <label><input type="radio" name="q8" value="3" /> D. Mã hóa dữ liệu</label>
                        </div>

                        <div id="q9">
                            <p><b>Câu 9:</b> Giao thức nào dùng để gửi email?</p>
                            <label><input type="radio" name="q9" value="0" /> A. FTP</label>
                            <label><input type="radio" name="q9" value="1" /> B. SSH</label>
                            <label><input type="radio" name="q9" value="2" /> C. SMTP</label>
                            <label><input type="radio" name="q9" value="3" /> D. POP3</label>
                        </div>

                        <div id="q10">
                            <p><b>Câu 10:</b> HTTP/2 cải tiến gì so với HTTP/1.1?</p>
                            <label><input type="radio" name="q10" value="0" /> A. Multiplexing</label>
                            <label><input type="radio" name="q10" value="1" /> B. Bảo mật tốt hơn</label>
                            <label><input type="radio" name="q10" value="2" /> C. Nén header</label>
                            <label><input type="radio" name="q10" value="3" /> D. Tất cả đáp án trên</label>
                        </div>

                        <button id="btn-submit-exam"><i class="fas fa-paper-plane"></i> Nộp bài</button>
                    </div>

                    <aside id="exam-sidebar">
                        <h4>Bảng câu hỏi</h4>
                        <div id="exam-nav">
                            <button data-q="q1">1</button>
                            <button data-q="q2">2</button>
                            <button data-q="q3">3</button>
                            <button data-q="q4">4</button>
                            <button data-q="q5">5</button>
                            <button data-q="q6">6</button>
                            <button data-q="q7">7</button>
                            <button data-q="q8">8</button>
                            <button data-q="q9">9</button>
                            <button data-q="q10">10</button>
                        </div>
                        <p>Đã làm: <span id="exam-done">0</span> / 10</p>
                    </aside>
                </div>
            </main>

            <dialog id="dialog-confirm">
                <div class="dialog-wrapper">
                    <h3>Xác nhận nộp bài</h3>
                    <p>Bạn có chắc muốn nộp bài không?</p>
                    <button id="btn-do-submit" class="btn-primary"><i class="fas fa-check"></i> Nộp bài</button>
                    <button id="btn-cancel-submit" class="btn-secondary"><i class="fas fa-times"></i> Tiếp tục làm</button>
                </div>
            </dialog>

            <dialog id="dialog-timeout">
                <div class="dialog-wrapper">
                    <h3><i class="fas fa-clock"></i> Hết giờ!</h3>
                    <p>Bài thi đã được tự động nộp.</p>
                    <a href="#/result"
                        ><button class="btn-primary"><i class="fas fa-chart-bar"></i> Xem kết quả</button></a
                    >
                </div>
            </dialog>
        </template>
